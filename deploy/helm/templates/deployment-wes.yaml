{{- if .Values.services.wes.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ferrum-lab-kit.name" . }}-wes
  labels:
    {{- include "ferrum-lab-kit.labels" . | nindent 4 }}
    app.kubernetes.io/component: wes
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/component: wes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferrum-lab-kit.name" . }}-wes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: wes
  template:
    metadata:
      labels:
        app.kubernetes.io/component: wes
        {{- include "ferrum-lab-kit.labels" . | nindent 8 }}
    spec:
      containers:
        - name: wes
          image: {{ .Values.services.wes.image }}
          ports:
            - containerPort: 8080
{{- end }}
