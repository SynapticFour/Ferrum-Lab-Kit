# ga4gh-infra auth plane for co-deploy with Ferrum Lab Kit.
# Port block 8180–8190 + mock-idp 9100 avoids clashes with Ferrum gateway on 8080.
# Images and layout follow ga4gh-infra docker/docker-compose.sqlite.yml.
#
# Set GA4GH_INFRA_CONFIG_DIR when compose output is not in the repo root (default below).

services:
  mock-idp:
    image: ${GA4GH_IMAGE_PREFIX:-ghcr.io/synapticfour}/mock-idp:${MOCK_IDP_VERSION:-0.1.0}
    networks: [lab]
    environment:
      MOCK_IDP_ISSUER: http://mock-idp:9100
      MOCK_IDP_HOST: 0.0.0.0
      MOCK_IDP_SIGNING_KEY_PEM: /secrets/mock_idp_rs256.pem
      MOCK_IDP_PORT: "9100"
      MOCK_IDP_SUBJECT: researcher@uni-heidelberg.de
      MOCK_IDP_CLIENT_ID: ga4gh-broker
      MOCK_IDP_CLIENT_SECRET: mock-client-secret
      RUST_LOG: info
    ports:
      - "9100:9100"
    volumes:
      - ${GA4GH_INFRA_SECRETS_DIR:-deploy/docker-compose/ga4gh-infra-secrets}:/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9100/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 10

  visa-registry:
    image: ${GA4GH_IMAGE_PREFIX:-ghcr.io/synapticfour}/visa-registry:${VISA_REGISTRY_VERSION:-0.1.0}
    networks: [lab]
    command: ["/config/visa-registry.toml"]
    environment:
      REGISTRY_BOOTSTRAP_API_KEY: dev-visa-api-key
      RUST_LOG: info
    ports:
      - "8181:8081"
    volumes:
      - ${GA4GH_INFRA_CONFIG_DIR:-deploy/docker-compose/ga4gh-infra-config}/visa-registry.toml:/config/visa-registry.toml:ro
      - ${GA4GH_INFRA_SECRETS_DIR:-deploy/docker-compose/ga4gh-infra-secrets}:/secrets:ro
      - ga4gh-visa-registry-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  duo-service:
    image: ${GA4GH_IMAGE_PREFIX:-ghcr.io/synapticfour}/duo-service:${DUO_SERVICE_VERSION:-0.1.0}
    networks: [lab]
    command: ["/config/duo-service.toml"]
    environment:
      RUST_LOG: info
    ports:
      - "8182:8082"
    volumes:
      - ${GA4GH_INFRA_CONFIG_DIR:-deploy/docker-compose/ga4gh-infra-config}/duo-service.toml:/config/duo-service.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  service-registry:
    image: ${GA4GH_IMAGE_PREFIX:-ghcr.io/synapticfour}/service-registry:${SERVICE_REGISTRY_VERSION:-0.1.0}
    networks: [lab]
    command: ["/config/service-registry.toml"]
    environment:
      SERVICE_REGISTRY_REGISTRATION_KEY: dev-service-registry-key
      RUST_LOG: info
    ports:
      - "8183:8083"
    volumes:
      - ${GA4GH_INFRA_CONFIG_DIR:-deploy/docker-compose/ga4gh-infra-config}/service-registry.toml:/config/service-registry.toml:ro
      - ga4gh-service-registry-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  access-decision-service:
    image: ${GA4GH_IMAGE_PREFIX:-ghcr.io/synapticfour}/access-decision-service:${ACCESS_DECISION_SERVICE_VERSION:-0.1.0}
    networks: [lab]
    command: ["/config/access-decision-service.toml"]
    environment:
      ADS_DAC_API_KEY: dev-ads-api-key
      REGISTRY_BOOTSTRAP_API_KEY: dev-visa-api-key
      RUST_LOG: info
    ports:
      - "8190:8090"
    volumes:
      - ${GA4GH_INFRA_CONFIG_DIR:-deploy/docker-compose/ga4gh-infra-config}/access-decision-service.toml:/config/access-decision-service.toml:ro
      - ga4gh-ads-data:/data
    depends_on:
      visa-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  aai-broker:
    image: ${GA4GH_IMAGE_PREFIX:-ghcr.io/synapticfour}/aai-broker:${AAI_BROKER_VERSION:-0.1.0}
    networks: [lab]
    command: ["/config/broker.toml"]
    environment:
      BROKER_COOKIE_SECRET: dev-broker-cookie-secret
      MOCK_IDP_CLIENT_SECRET: mock-client-secret
      ADS_DAC_API_KEY: dev-ads-api-key
      RUST_LOG: info
    ports:
      - "8180:8080"
    volumes:
      - ${GA4GH_INFRA_CONFIG_DIR:-deploy/docker-compose/ga4gh-infra-config}/broker.toml:/config/broker.toml:ro
      - ${GA4GH_INFRA_SECRETS_DIR:-deploy/docker-compose/ga4gh-infra-secrets}:/secrets:ro
    depends_on:
      mock-idp:
        condition: service_healthy
      visa-registry:
        condition: service_healthy
      access-decision-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ga4gh-visa-registry-data:
  ga4gh-service-registry-data:
  ga4gh-ads-data:
