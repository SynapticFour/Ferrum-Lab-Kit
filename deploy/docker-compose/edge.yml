# Edge/Field overlay for Ferrum Lab Kit.
# Apply on top of the base compose + service-specific fragments.
# Generated by: lab-kit generate compose --config lab-kit.toml
# (when field-edge profile is active)
#
# All Africa environment variables are ignored by stock Ferrum.
# They activate only when Ferrum upstream implements Africa Cursor Prompts.

services:
  ferrum-gateway:
    environment:
      # SQLite backend (Africa Prompt 1)
      FERRUM_AFRICA__OFFLINE_FIRST: "true"
      FERRUM_AFRICA__MAX_MEMORY_MB: "3072"
      FERRUM_AFRICA__SQLITE_PATH: "/data/ferrum.db"
      FERRUM_AFRICA__OBJECTS_PATH: "/data/objects"

      # Power monitor (Africa Prompt 3)
      FERRUM_AFRICA__POWER_ENABLED: "true"
      FERRUM_AFRICA__LOW_POWER_THRESHOLD: "40"
      FERRUM_AFRICA__EMERGENCY_THRESHOLD: "10"

      # Resource limits
      FERRUM_MAX_CONCURRENT_REQUESTS: "4"
      FERRUM_BACKGROUND_INDEXING: "false"

      # Bandwidth adaptive (Africa Prompt 3)
      FERRUM_BANDWIDTH_ADAPTIVE: "true"

    volumes:
      - ferrum-edge-data:/data
    deploy:
      resources:
        limits:
          memory: 3G      # respect Pi 4GB RAM limit
          cpus: "3.5"     # leave 0.5 CPU for OS

volumes:
  ferrum-edge-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${FERRUM_DATA_DIR:-$HOME/.ferrum}"
