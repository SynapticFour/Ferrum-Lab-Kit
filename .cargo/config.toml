# ARM64 / x86_64 release tuning for field-edge deployments (Pi 5, Apple Silicon, servers).
# See Ferrum docs/PERFORMANCE.md for Crypt4GH and I/O context.

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=cortex-a76",
    "-C", "target-feature=+neon,+aes,+sha2,+crc",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=apple-m1",
    "-C", "target-feature=+neon,+aes,+sha2,+sha3,+crc",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "target-feature=+aes,+sse4.2,+avx,+avx2",
]

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "debuginfo"
