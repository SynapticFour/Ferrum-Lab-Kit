version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day-of-month: "1"
    open-pull-requests-limit: 1
    groups:
      github_actions_all:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types:
          [
            "version-update:semver-major",
            "version-update:semver-minor",
            "version-update:semver-patch",
          ]

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      day-of-month: "1"
    open-pull-requests-limit: 1
    groups:
      cargo_all:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      # No patched release on crates.io (PAX header desync; upstream tracking issue).
      - dependency-name: "tokio-tar"
      # Legacy rustls 0.21 → webpki 0.101.x via aws-sdk; cannot jump to 0.103.x line.
      - dependency-name: "rustls-webpki"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
      - dependency-name: "aws-lc-sys"
        update-types: ["version-update:semver-patch"]
