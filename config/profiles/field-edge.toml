# Ferrum Lab Kit — Field/Edge profile
# For Raspberry Pi 5, laptops, and resource-constrained single-node deployments.
# Enables: Beacon v2 + DRS (minimal footprint)
# Disables: WES, TES, TRS (optional — can be re-enabled if hardware allows)
# Backend: SQLite + local filesystem (no PostgreSQL, no MinIO required)
# Auth: local-only Passport validation (no external IdP required for offline use)

[meta]
profile = "field-edge"
description = "Minimal GA4GH node for field labs and resource-constrained environments"
target_hardware = ["raspberry-pi-5", "laptop-arm64", "laptop-x86_64"]

[services]
beacon = true
drs = true
htsget = false  # disable by default — enable if bandwidth allows
wes = false     # disable by default — enable if local compute available
tes = false
trs = false

[backend]
database = "sqlite"           # no PostgreSQL required
storage = "local-filesystem"  # no MinIO/S3 required
sqlite_path = "~/.ferrum/ferrum.db"
objects_path = "~/.ferrum/objects"

[africa]
# These settings activate Ferrum Africa features if present in upstream.
# Ignored if Ferrum upstream does not implement the Africa Cursor Prompts.
offline_first = true
max_memory_mb = 3072          # conservative for 4GB Pi
power_monitor = true
low_power_threshold = 40
emergency_threshold = 10

[auth]
mode = "local"                # local Passport validation, no external IdP
# For internet-connected deployments, switch to "ls-login" and set credentials:
# mode = "ls-login"
# client_id = ""
# client_secret = ""

[network]
# Bandwidth-adaptive settings (activated if Ferrum upstream supports them)
bandwidth_adaptive = true
opportunistic_sync_schedule = "0 2 * * *"  # sync at 2am if internet available
chunk_size_low_bandwidth_kb = 512

[resources]
max_concurrent_requests = 4   # conservative for Pi
background_indexing = false   # disable to save CPU/RAM

[conformance]
# HelixTest conformance still runs — same GA4GH compliance, different hardware
helixtest_timeout_seconds = 120   # longer timeout for slower hardware
