# Ferrum Lab Kit — canonical example (copy to `lab-kit.toml`).
# Absent `[services.*]` blocks are not deployed. Set `external_url` to use your own endpoint.

schema_version = 1

[lab]
name = "Max Planck Institute for Molecular Genetics"
contact = "bioinformatics@molgen.mpg.de"
environment = "production" # staging | demo | production

[auth]
provider = "ls-login" # ls-login | keycloak | ldap | none (demo only)

[auth.ls-login]
client_id = "your-client-id"
client_secret = "your-client-secret"
# Discovery: https://login.elixir-czech.org/oidc/.well-known/openid-configuration
issuer = "https://login.elixir-czech.org/oidc/"
# redirect_uri = "https://lab.example.org/oauth/callback"
scopes = ["openid", "profile", "email", "offline_access", "ga4gh_passport_v1"]

